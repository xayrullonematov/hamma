name: Build Flutter Apps

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build_android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      
      # FIX 1: Explicitly setup Java 17 using Temurin for modern Android builds
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.x
          
      - name: Install dependencies
        run: flutter pub get
        
      - name: Build APK
        run: flutter build apk --release --split-per-abi
        
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: apks-${{ github.run_number }}
          path: build/app/outputs/flutter-apk/*.apk

  build_linux:
    runs-on: ubuntu-latest
    container:
      image: ubuntu:20.04
    steps:
      # FIX 2: Install dependencies BEFORE checkout so git, curl, and unzip exist
      - name: Install Linux dependencies
        run: |
          export DEBIAN_FRONTEND=noninteractive
          apt-get update
          apt-get install -y curl git unzip ca-certificates xz-utils zip libglu1-mesa \
            libgtk-3-dev liblzma-dev pkg-config libsecret-1-dev \
            libcurl4-openssl-dev build-essential clang cmake ninja-build \
            libdbus-1-dev libnm-dev libstdc++-dev

      # FIX 3: Tell git it is safe to operate as root inside the Docker container
      - name: Configure Git Safe Directory
        run: git config --global --add safe.directory '*'

      - name: Checkout repo
        uses: actions/checkout@v4
        
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.x
          
      - name: Install dependencies
        run: flutter pub get
        
      # FIX 4: Explicitly map the C/C++ compilers so CMake finds them
      - name: Build Linux
        run: |
          export CC=/usr/bin/clang
          export CXX=/usr/bin/clang++
          flutter build linux --release
          
      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-${{ github.run_number }}
          path: build/linux/x64/release/bundle/

  build_windows:
    runs-on: windows-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.x
          
      - name: Install dependencies
        run: flutter pub get
        
      - name: Build Windows
        run: flutter build windows --release
        
      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-${{ github.run_number }}
          path: build/windows/x64/runner/Release/
