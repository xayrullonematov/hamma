name: Build Flutter Apps

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build_android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.41.8'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos

      - name: Test
        run: flutter test

      - name: Build APK
        run: flutter build apk --release --split-per-abi

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: apks-${{ github.run_number }}
          path: build/app/outputs/flutter-apk/*.apk

  build_linux:
    runs-on: ubuntu-latest
    steps:
      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            curl git unzip ca-certificates xz-utils zip \
            libglu1-mesa libgtk-3-dev liblzma-dev pkg-config \
            libsecret-1-dev libcurl4-openssl-dev build-essential \
            clang cmake ninja-build libdbus-1-dev libnm-dev jq \
            libstdc++-12-dev libgtk-3-0 libdbus-1-3 \
            libfontconfig1-dev libxkbcommon-dev libgl1-mesa-dev \
            libxcursor-dev libxinerama-dev libxrandr-dev libxss-dev \
            libxt-dev libxtst-dev libglib2.0-0t64

      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.41.8'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build Linux
        run: |
          export CC=/usr/bin/clang
          export CXX=/usr/bin/clang++
          flutter build linux --release

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-${{ github.run_number }}
          path: build/linux/x64/release/bundle/

  build_windows:
    runs-on: windows-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.41.8'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build Windows
        run: flutter build windows --release

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-${{ github.run_number }}
          path: build/windows/x64/runner/Release/
