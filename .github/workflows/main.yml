name: Build & Release Hamma

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

# Allow the release job to publish GitHub Releases.
permissions:
  contents: write

env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

jobs:
  # ─────────────────────────────────────────────────────────────
  # Verify — runs `flutter analyze --fatal-warnings` and the full
  # test suite on a 3-OS matrix (Linux, macOS, Windows). Every
  # platform build job below blocks on this job, so a regression
  # cannot ship a release artifact.
  #
  # Coverage is collected on each OS and uploaded as a workflow
  # artifact (`coverage-<os>`) for later inspection. We deliberately
  # skip third-party coverage services for now — the artifact is the
  # source of truth.
  # ─────────────────────────────────────────────────────────────
  verify:
    name: Verify (analyze + test)
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4.2.2

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.44.2'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze (fatal warnings)
        run: flutter analyze --fatal-warnings

      - name: Test (with coverage)
        run: flutter test --coverage

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4.6.2
        with:
          name: coverage-${{ matrix.os }}-${{ github.run_number }}
          path: coverage/lcov.info
          if-no-files-found: ignore

  # ─────────────────────────────────────────────────────────────
  # Android — APK (split per ABI)
  #
  # Zero-cost now: APKs are debug-signed, fully installable via sideload.
  # To release-sign, add these 4 secrets in GitHub → Settings → Secrets:
  #   ANDROID_KEYSTORE_BASE64  — base64 of your .jks file
  #                              generate: keytool -genkey -v -keystore hamma-release.jks \
  #                                -alias hamma -keyalg RSA -keysize 2048 -validity 10000
  #                              encode:   base64 -w 0 hamma-release.jks
  #   ANDROID_KEY_STORE_PASSWORD  — password you chose for the keystore
  #   ANDROID_KEY_ALIAS           — alias you chose (e.g. hamma)
  #   ANDROID_KEY_PASSWORD        — password you chose for the key
  # Once all 4 secrets are present, CI automatically produces release-signed APKs.
  # ─────────────────────────────────────────────────────────────
  build_android:
    name: Android APK
    needs: [verify]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v4.7.0
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.44.2'
          cache: true

      - name: Stamp version into pubspec.yaml
        run: |
          if [[ "${GITHUB_REF_NAME}" =~ ^v[0-9] ]]; then
            SEMVER="${GITHUB_REF_NAME#v}"
          else
            SEMVER=$(grep '^version:' pubspec.yaml | sed 's/version: //' | cut -d'+' -f1)
          fi
          BUILD=$(git rev-list --count HEAD)
          sed -i "s/^version: .*/version: ${SEMVER}+${BUILD}/" pubspec.yaml
          echo "Stamped version: ${SEMVER}+${BUILD}"
          grep '^version:' pubspec.yaml

      - name: Install dependencies
        run: flutter pub get

      # Decodes the keystore from a base64 secret and writes key.properties.
      # Skipped automatically (with a warning) when the secret is not set.
      - name: Set up Android release signing
        env:
          KEYSTORE_B64:   ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          STORE_PASSWORD: ${{ secrets.ANDROID_KEY_STORE_PASSWORD }}
          KEY_ALIAS:      ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD:   ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ -n "$KEYSTORE_B64" ]; then
            echo "$KEYSTORE_B64" | base64 --decode > android/hamma-release.jks
            printf 'storeFile=hamma-release.jks\nstorePassword=%s\nkeyAlias=%s\nkeyPassword=%s\n' \
              "$STORE_PASSWORD" "$KEY_ALIAS" "$KEY_PASSWORD" \
              > android/key.properties
            echo "Release signing configured — APKs will be release-signed"
          else
            echo "::warning::ANDROID_KEYSTORE_BASE64 not set — APKs will be debug-signed (sideload only)"
          fi

      # fllama compiles its native lib via the Dart native-assets hook, which
      # forces a single universal APK — Gradle does not emit per-ABI splits, so
      # --split-per-abi makes flutter look for split files that are never
      # produced and fail *after* a successful 16-min build. Build one APK.
      - name: Build APK
        run: |
          flutter build apk \
            --release \
            --dart-define=SENTRY_DSN=${{ secrets.SENTRY_DSN }} \
            2>&1 | tee build.log || true

          # Flutter 3.44+ with AGP 8.7+ may not copy the APK to flutter-apk/.
          # Find it at the standard Gradle output path and place it where the
          # workflow expects it.
          APK_FLUTTER="build/app/outputs/flutter-apk/app-release.apk"
          APK_GRADLE="build/app/outputs/apk/release/app-release.apk"

          if [ -f "$APK_FLUTTER" ]; then
            echo "APK found at flutter-apk path"
          elif [ -f "$APK_GRADLE" ]; then
            echo "APK found at Gradle output path — copying to flutter-apk/"
            mkdir -p build/app/outputs/flutter-apk
            cp "$APK_GRADLE" "$APK_FLUTTER"
          else
            echo "::error::APK build failed — no APK found in either output path"
            tail -100 build.log
            exit 1
          fi

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4.6.2
        with:
          name: android-build-logs-${{ github.run_number }}
          path: build.log

      - name: Rename APK with brand prefix
        run: |
          cd build/app/outputs/flutter-apk
          mv app-release.apk Hamma-release.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4.6.2
        with:
          name: apks-${{ github.run_number }}
          path: build/app/outputs/flutter-apk/Hamma-*.apk

  # ─────────────────────────────────────────────────────────────
  # Linux — AppImage
  #
  # Zero-cost now: AppImage is unsigned.
  # To GPG-sign (strongly recommended before listing on Flathub/Snap):
  #   GPG_PRIVATE_KEY  — output of: gpg --export-secret-keys --armor YOUR_KEY_ID
  #   GPG_PASSPHRASE   — passphrase for that key (use "" if the key has no passphrase)
  # Once both secrets are present, CI signs the AppImage and uploads
  # Hamma-x86_64.AppImage.asc alongside it.
  # ─────────────────────────────────────────────────────────────
  build_linux:
    name: Linux AppImage
    needs: [verify]
    runs-on: ubuntu-latest
    steps:
      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            curl git unzip ca-certificates xz-utils zip \
            libglu1-mesa libgtk-3-dev liblzma-dev pkg-config \
            libsecret-1-dev libcurl4-openssl-dev build-essential \
            clang cmake ninja-build libdbus-1-dev libnm-dev jq \
            libstdc++-12-dev libgtk-3-0 libdbus-1-3 \
            libfontconfig1-dev libxkbcommon-dev libgl1-mesa-dev \
            libxcursor-dev libxinerama-dev libxrandr-dev libxss-dev \
            libxt-dev libxtst-dev libglib2.0-0t64 \
            libkeybinder-3.0-dev \
            libayatana-appindicator3-dev

      - name: Checkout repo
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.44.2'
          cache: true

      - name: Stamp version into pubspec.yaml
        run: |
          if [[ "${GITHUB_REF_NAME}" =~ ^v[0-9] ]]; then
            SEMVER="${GITHUB_REF_NAME#v}"
          else
            SEMVER=$(grep '^version:' pubspec.yaml | sed 's/version: //' | cut -d'+' -f1)
          fi
          BUILD=$(git rev-list --count HEAD)
          sed -i "s/^version: .*/version: ${SEMVER}+${BUILD}/" pubspec.yaml
          echo "Stamped version: ${SEMVER}+${BUILD}"
          grep '^version:' pubspec.yaml

      - name: Install dependencies
        run: flutter pub get

      - name: Build Linux
        run: |
          export CC=/usr/bin/clang
          export CXX=/usr/bin/clang++
          export SENTRY_NATIVE_BACKEND=crashpad
          flutter build linux --release --dart-define=SENTRY_DSN=${{ secrets.SENTRY_DSN }}

      - name: Package as AppImage
        run: |
          BUNDLE=build/linux/x64/release/bundle

          mkdir -p Hamma.AppDir
          cp -r "$BUNDLE"/. Hamma.AppDir/

          cp assets/images/logo.png Hamma.AppDir/hamma.png
          cp assets/images/logo.png Hamma.AppDir/.DirIcon

          cat > Hamma.AppDir/hamma.desktop << 'DESKTOP'
          [Desktop Entry]
          Type=Application
          Name=Hamma
          Exec=hamma
          Icon=hamma
          Comment=AI Server Manager and SSH Client
          Categories=Network;System;
          DESKTOP

          cat > Hamma.AppDir/AppRun << 'APPRUN'
          #!/bin/sh
          HERE="$(dirname "$(readlink -f "$0")")"
          export LD_LIBRARY_PATH="$HERE/lib${LD_LIBRARY_PATH:+:$LD_LIBRARY_PATH}"
          export PATH="$HERE/lib:$PATH"
          exec "$HERE/hamma" "$@"
          APPRUN
          chmod +x Hamma.AppDir/AppRun
          chmod +x Hamma.AppDir/hamma

          wget -q "https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage" \
               -O appimagetool
          chmod +x appimagetool

          ARCH=x86_64 APPIMAGE_EXTRACT_AND_RUN=1 \
            ./appimagetool --no-appstream Hamma.AppDir Hamma-x86_64.AppImage

      # Signs the AppImage with your GPG key and produces a detached .asc file.
      # Skipped automatically when GPG_PRIVATE_KEY secret is not set.
      - name: GPG-sign AppImage
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE:  ${{ secrets.GPG_PASSPHRASE }}
        run: |
          if [ -n "$GPG_PRIVATE_KEY" ]; then
            echo "$GPG_PRIVATE_KEY" | gpg --batch --import
            echo "$GPG_PASSPHRASE" | gpg --batch --yes --passphrase-fd 0 \
              --detach-sign --armor Hamma-x86_64.AppImage
            echo "AppImage GPG-signed → Hamma-x86_64.AppImage.asc created"
          else
            echo "::warning::GPG_PRIVATE_KEY not set — AppImage will be unsigned"
          fi

      - name: Upload Linux bundle artifact
        uses: actions/upload-artifact@v4.6.2
        with:
          name: linux-bundle-${{ github.run_number }}
          path: build/linux/x64/release/bundle/

      # Uploads both the AppImage and its .asc signature (if it was created).
      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4.6.2
        with:
          name: linux-appimage-${{ github.run_number }}
          path: Hamma-x86_64.AppImage*

  # ─────────────────────────────────────────────────────────────
  # Windows — Inno Setup installer (.exe)
  #
  # Zero-cost now: installer is unsigned (Windows SmartScreen will warn).
  # To Authenticode-sign (removes SmartScreen warning):
  #   WINDOWS_CERT_BASE64   — base64 of your .pfx file
  #                           encode: certutil -encode cert.pfx cert.b64  (Windows)
  #                           or:     base64 -w 0 cert.pfx               (Linux/macOS)
  #   WINDOWS_CERT_PASSWORD — password for the .pfx
  # Once both secrets are present, CI signs the installer before upload.
  # Supported CAs: SSL.com, Sectigo, DigiCert, Certum (OSS free option).
  # ─────────────────────────────────────────────────────────────
  build_windows:
    name: Windows Installer
    needs: [verify]
    runs-on: windows-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.44.2'
          cache: true

      - name: Stamp version into pubspec.yaml
        shell: pwsh
        run: |
          $ref = $env:GITHUB_REF_NAME
          if ($ref -match '^v(\d.+)') {
            $semver = $Matches[1]
          } else {
            $semver = (Select-String '^version:' pubspec.yaml).Line `
              -replace 'version: ', '' `
              -replace '\+.*', ''
          }
          $build = (git rev-list --count HEAD).Trim()
          (Get-Content pubspec.yaml) `
            -replace '^version: .*', "version: ${semver}+${build}" `
            | Set-Content pubspec.yaml
          Write-Host "Stamped version: ${semver}+${build}"
          Select-String '^version:' pubspec.yaml

      - name: Install dependencies
        run: flutter pub get

      - name: Build Windows
        run: flutter build windows --release --dart-define=SENTRY_DSN=${{ secrets.SENTRY_DSN }}

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Build installer
        shell: pwsh
        run: |
          $line = (Select-String '^version:' pubspec.yaml).Line
          $version = ($line -replace 'version: ', '' -split '\+')[0]
          Write-Host "Building installer version $version"
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" `
              "/DAppVersion=$version" `
              "installer\windows\hamma.iss"

      # Signs the installer with your Authenticode (.pfx) certificate.
      # Skipped automatically when WINDOWS_CERT_BASE64 secret is not set.
      - name: Sign Windows installer
        env:
          CERT_B64:      ${{ secrets.WINDOWS_CERT_BASE64 }}
          CERT_PASSWORD: ${{ secrets.WINDOWS_CERT_PASSWORD }}
        shell: pwsh
        run: |
          if ($env:CERT_B64) {
            [IO.File]::WriteAllBytes("cert.pfx", [Convert]::FromBase64String($env:CERT_B64))
            $signtool = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin" `
              -Recurse -Filter signtool.exe -ErrorAction SilentlyContinue `
              | Where-Object { $_.FullName -like '*x64*' } `
              | Select-Object -First 1 -ExpandProperty FullName
            if (-not $signtool) {
              Write-Error "signtool.exe not found — install Windows SDK"
              exit 1
            }
            & $signtool sign /f cert.pfx /p $env:CERT_PASSWORD `
              /fd SHA256 /tr "http://timestamp.sectigo.com" /td SHA256 `
              Hamma-Setup-Windows-x64.exe
            Remove-Item cert.pfx -Force
            Write-Host "::notice::Windows installer signed successfully"
          } else {
            Write-Warning "WINDOWS_CERT_BASE64 not set — installer unsigned (SmartScreen warning expected on first run)"
          }

      - name: Upload Windows bundle artifact
        uses: actions/upload-artifact@v4.6.2
        with:
          name: windows-bundle-${{ github.run_number }}
          path: build/windows/x64/runner/Release/

      - name: Upload Windows installer artifact
        uses: actions/upload-artifact@v4.6.2
        with:
          name: windows-installer-${{ github.run_number }}
          path: Hamma-Setup-Windows-x64.exe

  # ─────────────────────────────────────────────────────────────
  # GitHub Release — only on v* tags
  # ─────────────────────────────────────────────────────────────
  release:
    name: Publish GitHub Release
    needs: [build_android, build_linux, build_windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download Android APKs
        uses: actions/download-artifact@v4
        with:
          name: apks-${{ github.run_number }}
          path: dist/

      - name: Download Linux AppImage
        uses: actions/download-artifact@v4
        with:
          name: linux-appimage-${{ github.run_number }}
          path: dist/

      - name: Download Windows installer
        uses: actions/download-artifact@v4
        with:
          name: windows-installer-${{ github.run_number }}
          path: dist/

      - name: List release assets
        run: ls -lh dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Hamma ${{ github.ref_name }}"
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, 'beta') || contains(github.ref_name, 'alpha') || contains(github.ref_name, 'rc') }}
          body: |
            # Hamma ${{ github.ref_name }}

            **Manage your server without writing commands.** Hamma connects to
            your servers directly over SSH from your own device and pairs it
            with an on-device AI copilot — no backend proxy, no cloud relay, no
            telemetry. Your credentials and your sessions never leave your machine.

            ## Downloads

            | Platform | Download | Requirements |
            |----------|----------|--------------|
            | 🤖 **Android** | `Hamma-release.apk` | Android 7.0 (API 24) or newer · phones, tablets & emulators |
            | 🐧 **Linux** | `Hamma-x86_64.AppImage` | Any modern 64-bit Linux distribution |
            | 🪟 **Windows** | `Hamma-Setup-Windows-x64.exe` | Windows 10 or 11 (64-bit) |

            > The Android build is a single universal APK that runs on every
            > supported architecture (ARM64, ARM32, x86_64) — install the one file
            > on any device.

            ## Highlights

            - 🔐 **Local-first security** — SSH keys stay encrypted at rest in an
              Argon2id + AES-256 vault and are decrypted in memory only for the
              duration of a session.
            - 🤖 **On-device AI copilot** — runs entirely on loopback; prompts are
              never sent to a remote host. Cloud providers remain strictly opt-in.
            - ✅ **No surprises** — every AI-suggested command is shown, editable,
              risk-assessed, and only ever runs after you confirm it.
            - 🚫 **Zero telemetry** — no analytics, no crash-report uploads.

            ## Installation

            **Android** — download `Hamma-release.apk`, then enable
            *Install unknown apps* for your browser or file manager and open it.

            **Linux**
            ```sh
            chmod +x Hamma-x86_64.AppImage
            ./Hamma-x86_64.AppImage
            ```

            **Windows** — run `Hamma-Setup-Windows-x64.exe` and follow the
            installer wizard. On first launch, SmartScreen may warn for unsigned
            builds; choose *More info → Run anyway*.

            ---

            _Released from tag `${{ github.ref_name }}`. See the full changelog below._
          files: dist/*
