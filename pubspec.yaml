name: hamma
description: "Hamma — AI-powered SSH client and server manager for Linux, Windows, and Android."
publish_to: 'none'

# Semantic version: bump MAJOR.MINOR.PATCH when releasing.
# Build number (+N) is used by Android (versionCode) and iOS (CFBundleVersion).
version: 1.0.0+1

environment:
  sdk: ^3.7.0

# Dependencies specify other packages that your package needs in order to work.
# To automatically upgrade your package dependencies to the latest versions
# consider running `flutter pub upgrade --major-versions`. Alternatively,
# dependencies can be manually updated by changing the version numbers below to
# the latest version available on pub.dev. To see which dependencies have newer
# versions available, run `flutter pub outdated`.
dependencies:
  flutter:
    sdk: flutter

  # The following adds the Cupertino Icons font to your application.
  # Use with the CupertinoIcons class for iOS style icons.
  cupertino_icons: ^1.0.8
  dartssh2: ^2.11.0
  flutter_secure_storage: ^10.0.0
  xterm: ^4.0.0
  sentry_flutter: ^9.17.0
  url_launcher: ^6.3.1
  local_auth: ^2.2.0
  http: ^1.2.0
  encrypt: ^5.0.3
  share_plus: ^10.1.0
  file_picker: ^8.1.2
  window_manager: ^0.5.1
  path_provider: ^2.1.5
  path: ^1.9.0
  crypto: ^3.0.6
  pinenacl: ^0.6.0
  pointycastle: ^3.9.1
  flutter_markdown_plus: ^1.0.7
  re_editor: ^0.8.0
  re_highlight: ^0.0.3
  flutter_local_notifications: ^18.0.1
  workmanager: ^0.9.0
  hotkey_manager: ^0.2.3
  tray_manager: ^0.5.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  # The "flutter_lints" package below contains a set of recommended lints to
  # encourage good coding practices. The lint set provided by the package is
  # activated in the `analysis_options.yaml` file located at the root of your
  # package. See that file for information about deactivating specific lint
  # rules and activating additional ones.
  flutter_lints: ^5.0.0
  msix: ^3.16.13
  flutter_launcher_icons: ^0.14.3

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  assets:
    - assets/images/logo.png
    - assets/fonts/

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/InterVariable.ttf
        - asset: assets/fonts/InterVariable-Italic.ttf
          style: italic

    - family: JetBrains Mono
      fonts:
        - asset: assets/fonts/JetBrainsMono-Regular.ttf
          weight: 400
        - asset: assets/fonts/JetBrainsMono-Italic.ttf
          weight: 400
          style: italic
        - asset: assets/fonts/JetBrainsMono-Medium.ttf
          weight: 500
        - asset: assets/fonts/JetBrainsMono-Bold.ttf
          weight: 700

flutter_launcher_icons:
  image_path: "assets/images/logo.png"
  android: true
  min_sdk_android: 21
  windows:
    generate: true
    image_path: "assets/images/logo.png"
    icon_size: 48
  linux:
    generate: true
    image_path: "assets/images/logo.png"
